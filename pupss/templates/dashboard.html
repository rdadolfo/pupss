{% extends 'base.html' %}
{% load static %}

{% block title %} PUPSS | Dashboard {% endblock %}
{%block content %}

<link rel="stylesheet" type="text/css" href="{% static 'css/dashboard.css' %}">

<h1 class="main-title">PUPSS Dashboard</h1>

    <section class="cards">
      <div class="card">
        <div class="card-icons">
          <div class="icon">
            <img src="{% static 'img/hatespeech_bold.png' %}"/>
          </div>
          <h3 id="stat-hate">...</h3>
        </div>
        <h2>Total Hate Speech</h2>
      </div>

      <div class="card">
        <div class="card-icons">
          <div class="icon">
            <img src="{% static 'img/safe.png' %}" alt="AI Logo">
          </div>
          <h3 id="stat-safe">...</h3>
        </div>
        <h2>Total Safe Speech</h2>
      </div>
      <div class="card">
        <div class="card-icons">
          <div class="icon">
            <img src="{% static 'img/professor.png' %}"/>
          </div>
          <h3 id="stat-reports">...</h3>
        </div>
        <h2>Overall Toxicity</h2>
      </div>

      <div class="card">
        <div class="card-icons">
          <div class="icon">
            <img src="{% static 'img/students.png' %}" alt="AI Logo">
          </div>
          <h3 id="stat-pct">...</h3>
        </div>
        <h2>Total Hate Percentage</h2>
      </div>
    </section>

<script src="{% static 'js/dashboard.js' %}"></script>
{% endblock %}
